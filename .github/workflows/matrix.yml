name: matrix-builds
on:
  workflow_dispatch:

jobs:
  matrix-builds:
    runs-on: ${{matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        exclude:
          - os: ["windows-latest"]
          - python-version: ["3.10"]
        python-version: ["3.11", "3.12"]
        os: ["macos-latest","ubuntu-latest"]

    steps:
      - name: checks-out code
        uses: actions/checkout@v4
        
      - name: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: ${{matrix.python-version}}

      - name: version of installed python
        run: python --version
