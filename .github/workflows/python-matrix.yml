name: python-setup
on:
  workflow_dispatch:

jobs:
  python-setup:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
    steps:
      - name: setup-python "${{ matrix.python-version}}"
        uses: actions/setup-python@v5
        with: 
          python-version: "${{ matrix.python-version}}"
    
