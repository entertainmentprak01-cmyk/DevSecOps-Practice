name: multi-job-wf
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: building the app
        run: echo "Build the app"
  test:
    runs-on: self-hosted
    needs: build
    steps:
      - name: testing the app
        run: echo "Running the test cases"
  deploy:
    runs-on: self-hosted
    needs: test
    steps:
      - name: deploying the app
        run: echo "Deploying"
