name: docker-installations in Multi-OS
on:
  workflow_dispatch:

jobs:
  docker-installations:
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
    runs-on: ubuntu-latest
    steps:
      - name: docker-installations "${{ matrix.os}}"
        run: sudo apt-get update && sudo apt-get install docker
      - name: verify installation "${{matrix.os}}"
        run: docker --version
      - name: adding the ubuntu user to docker
        run: sudo usermod -aG docker $USER
